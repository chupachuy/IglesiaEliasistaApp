<ion-header mode="md" class="ion-no-border">
  <ion-toolbar class="glass-header">
    <ion-title>Iglesia Eliasista</ion-title>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-menu"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
  
<ion-content [fullscreen]="true" class="ion-padding-bottom">
  <div class="hero-section">
    <div class="hero-content">
      <h1>Bienvenido a la casa<br>del Padre</h1>
      <p>Entérate de las últimas noticias, mensajes y decretos de la Iglesia Eliasista de México.</p>
    </div>
  </div>

  <div class="feed-container">
    <ion-card class="magazine-card" *ngFor="let post of posts" (click)="openPost(post?.id)">
      <div class="img-wrapper">
        <ion-img class="post-img" [src]="post?.jetpack_featured_media_url || 'assets/logo.jpg'"></ion-img>
        <div class="date-badge">{{post?.date | date:'shortDate'}}</div>
      </div>
      <div class="post-content">
        <h3 class="post-title" [innerHTML]="post?.title?.rendered"></h3>
        <div class="post-excerpt" [innerHTML]="post?.excerpt?.rendered"></div>
        <div class="read-more">Leer artículo <ion-icon name="arrow-forward-outline"></ion-icon></div>
      </div>
    </ion-card>
  </div>
</ion-content>
