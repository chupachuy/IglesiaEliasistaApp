<ion-header mode="md" class="ion-no-border">
  <ion-toolbar class="glass-header">
    <ion-title>Próximos Eventos</ion-title>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-menu"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="header-banner">
    <div class="glass-panel info-panel">
      <ion-icon name="calendar-outline" class="info-icon"></ion-icon>
      <p>Entérate antes que nadie de los diversos eventos, reuniones y ceremonias especiales que tenemos preparados para ti en nuestra comunidad.</p>
    </div>
  </div>

  <div class="events-container">
    <ion-card class="event-card" *ngFor="let evento of eventos">
      <div class="event-img-wrapper">
        <ion-img class="event-img" [src]="evento.image_url || 'assets/logo.jpg'" alt="{{ evento.invitation }}"></ion-img>
        <div class="date-badge">
          <ion-icon name="time-outline"></ion-icon>
          <span>{{ evento.date_event }} | {{ evento.hour_event }}</span>
        </div>
      </div>
      
      <div class="event-content">
        <h2 class="event-title">{{ evento.title }}</h2>
        <span class="event-subtitle" *ngIf="evento.invitation">{{ evento.invitation }}</span>
        
        <div class="event-location" *ngIf="evento.place">
          <ion-icon name="location-outline"></ion-icon>
          <p>{{ evento.place }}</p>
        </div>
      </div>
    </ion-card>
  </div>
</ion-content>
