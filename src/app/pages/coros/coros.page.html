<ion-header class="ion-no-border" mode="md">
  <ion-toolbar class="transparent-header">
    <ion-title class="ion-text-center">Coros Eliasistas</ion-title>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-menu" color="light"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="premium-bg">
  <div class="header-banner">
    <div class="disc-animation" [class.spinning]="isPlaying">
      <img src="assets/logo.jpg" alt="Coros Eliasistas">
      <div class="disc-center"></div>
    </div>
  </div>

  <div class="playlist-container">
    <ion-searchbar 
      [(ngModel)]="searchQuery" 
      (ionInput)="onSearch($event)"
      placeholder="Buscar coro o letra..."
      class="custom-searchbar">
    </ion-searchbar>
    
    <h3 class="section-title">Lista de Reproducción ({{ filteredPlaylist.length }})</h3>
    <div class="transparent-list">
      <div class="track-item" *ngFor="let track of filteredPlaylist" (click)="start(track)" [class.active-track]="track == activeTrack">
        <div class="track-avatar">
          <ion-icon name="musical-notes"></ion-icon>
        </div>
        <div class="track-label">
          <h2>{{ track.name }}</h2>
          <p *ngIf="track.lyrics" class="has-lyrics">
            <ion-icon name="document-text"></ion-icon> Con letra
          </p>
          <p *ngIf="!track.lyrics">Coro Eliasista</p>
        </div>
        <div class="track-icon">
          <ion-icon *ngIf="track == activeTrack && isPlaying" class="playing-icon" name="musical-notes"></ion-icon>
          <ion-icon *ngIf="track != activeTrack || !isPlaying" class="inactive-icon" name="play-circle-outline"></ion-icon>
        </div>
      </div>
      
      <div *ngIf="filteredPlaylist.length === 0" class="no-results">
        <ion-icon name="search-outline"></ion-icon>
        <p>No se encontraron coros</p>
      </div>
    </div>
  </div>
</ion-content>

<!-- Premium Floating Player -->
<div class="floating-player-wrapper" *ngIf="activeTrack" [class.minimized]="!playerExpanded" (touchstart)="onPlayerTouchStart($event)" (touchend)="onPlayerTouchEnd($event)">
  <div class="glass-player">
    <!-- Swipe Indicator -->
    <div class="swipe-indicator">
      <div class="swipe-bar"></div>
    </div>

    <ion-button *ngIf="playerExpanded" fill="clear" (click)="stop()" class="close-player">
      <ion-icon slot="icon-only" name="close-circle"></ion-icon>
    </ion-button>

    <div class="player-info">
      <div class="mini-disc" [class.spinning]="isPlaying">
        <img src="assets/logo.jpg" alt="Coros">
        <div class="disc-center"></div>
      </div>
      <div class="player-text" *ngIf="playerExpanded">
        <div class="scrolling-text">
            <h4>{{ activeTrack.name }}</h4>
        </div>
        <p>REPRODUCIENDO AHORA</p>
      </div>
    </div>
    
    <div class="player-progress" *ngIf="playerExpanded">
      <ion-range #range [(ngModel)]="progress" max="100" class="custom-range" (touchend)="seek()" (mouseup)="seek()"></ion-range>
    </div>

    <div class="player-bottom">
      <div class="player-controls">
        <ion-button fill="clear" (click)="prev()" class="ctrl-btn">
          <ion-icon slot="icon-only" name="play-skip-back"></ion-icon>
        </ion-button>

        <ion-button class="main-play" fill="clear" (click)="togglePlayer(isPlaying)">
          <ion-icon slot="icon-only" [name]="isPlaying ? 'pause' : 'play'"></ion-icon>
        </ion-button>

        <ion-button fill="clear" (click)="next()" class="ctrl-btn">
          <ion-icon slot="icon-only" name="play-skip-forward"></ion-icon>
        </ion-button>
      </div>

      <div class="volume-container" *ngIf="playerExpanded">
        <ion-icon [name]="volume === 0 ? 'volume-mute' : (volume < 0.5 ? 'volume-low' : 'volume-high')" class="volume-icon"></ion-icon>
        <ion-range [(ngModel)]="volume" max="1" step="0.1" class="volume-range" (ionChange)="setVolume()"></ion-range>
      </div>

      <div class="lyrics-button-container" *ngIf="playerExpanded">
        <ion-button fill="clear" (click)="showLyrics()" class="lyrics-btn">
          <ion-icon slot="icon-only" name="document-text-outline"></ion-icon>
        </ion-button>
      </div>
    </div>
  </div>
</div>
