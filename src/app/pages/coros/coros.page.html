<ion-header class="ion-no-border" mode="md">
  <ion-toolbar class="transparent-header">
    <ion-title class="ion-text-center">Coros Eliasistas</ion-title>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-menu" color="light"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="premium-bg">
  <div class="header-banner">
    <div class="disc-animation" [class.spinning]="isPlaying">
      <img src="assets/logo.jpg" alt="Coros Eliasistas">
      <div class="disc-center"></div>
    </div>
  </div>

  <div class="playlist-container">
    <h3 class="section-title">Lista de Reproducción</h3>
    <ion-list lines="none" class="transparent-list">
      <ion-item class="track-item" *ngFor="let track of playlist" (click)="start(track)" [class.active-track]="track == activeTrack">
        <div class="track-avatar" slot="start">
          <ion-icon name="musical-notes"></ion-icon>
        </div>
        <ion-label>
          <h2>{{ track.name }}</h2>
          <p>Coro Eliasista</p>
        </ion-label>
        <ion-icon *ngIf="track == activeTrack && isPlaying" class="playing-icon" name="musical-notes" slot="end"></ion-icon>
        <ion-icon *ngIf="track != activeTrack || !isPlaying" name="play-circle-outline" slot="end" class="inactive-icon"></ion-icon>
      </ion-item>
    </ion-list>
  </div>
</ion-content>

<!-- Premium Floating Player -->
<div class="floating-player-wrapper" *ngIf="activeTrack">
  <div class="glass-player">
    <div class="player-info">
      <div class="player-text">
        <div class="scrolling-text">
            <h4>{{ activeTrack.name }}</h4>
        </div>
        <p>REPRODUCIENDO AHORA</p>
      </div>
    </div>
    
    <div class="player-progress">
      <ion-range #range [(ngModel)]="progress" max="100" class="custom-range" (touchend)="seek()" (mouseup)="seek()"></ion-range>
    </div>

    <div class="player-controls">
      <ion-button fill="clear" (click)="prev()" class="ctrl-btn">
        <ion-icon slot="icon-only" name="play-skip-back"></ion-icon>
      </ion-button>

      <ion-button class="main-play" fill="clear" (click)="togglePlayer(isPlaying)">
        <ion-icon slot="icon-only" [name]="isPlaying ? 'pause' : 'play'"></ion-icon>
      </ion-button>

      <ion-button fill="clear" (click)="next()" class="ctrl-btn">
        <ion-icon slot="icon-only" name="play-skip-forward"></ion-icon>
      </ion-button>
    </div>
  </div>
</div>
